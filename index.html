<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LR単語帳">
<meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>LR単語帳</title>
<style>
:root{
  --bg:#fafaf7;--card-bg:#fff;--text:#1a1a1a;--text-2:#555;--text-3:#888;
  --border:rgba(0,0,0,0.1);--border-h:rgba(0,0,0,0.2);--bg-2:#f1efe8;
  --ok:#0F6E56;--ok-bg:#E1F5EE;--ok-border:#1D9E75;
  --maybe:#854F0B;--maybe-bg:#FAEEDA;--maybe-border:#EF9F27;
  --no:#A32D2D;--no-bg:#FCEBEB;--no-border:#E24B4A;
  --info:#185FA5;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
@media (prefers-color-scheme: dark){:root{
  --bg:#1a1a1a;--card-bg:#2a2a2a;--text:#f0f0f0;--text-2:#b0b0b0;--text-3:#888;
  --border:rgba(255,255,255,0.15);--border-h:rgba(255,255,255,0.3);--bg-2:#333;
}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{margin:0;padding:calc(var(--safe-top)+24px) calc(env(safe-area-inset-right,0px) + 24px) calc(var(--safe-bot)+16px) calc(env(safe-area-inset-left,0px) + 24px);
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
  line-height:1.6;max-width:520px;margin-left:auto;margin-right:auto;
  -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  min-height:100vh;min-height:100dvh;}
.fc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:14px;color:var(--text-2);gap:8px;}
.fc-quitbtn{background:transparent;border:0.5px solid var(--border);color:var(--text-2);padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
.fc-quitbtn:active{background:var(--bg-2);}
.fc-card{background:var(--card-bg);border:0.5px solid var(--border);border-radius:16px;padding:24px 20px;min-height:340px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;}
.fc-card:active{background:var(--bg-2);}
.fc-rank-row{display:inline-flex;gap:8px;font-size:12px;color:var(--text-3);margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.fc-fl{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--bg-2);color:var(--text-2);}
.fc-mem-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.fc-mem-new{background:var(--bg-2);color:var(--text-2);}
.fc-mem-learning{background:var(--maybe-bg);color:var(--maybe);}
.fc-mem-known{background:var(--ok-bg);color:var(--ok);}
.fc-mem-hard{background:var(--no-bg);color:var(--no);}
.fc-word-row{display:flex;align-items:center;gap:10px;margin:0 0 6px;flex-wrap:wrap;}
.fc-word{font-size:36px;font-weight:600;margin:0;letter-spacing:-0.01em;}
.fc-speak{background:transparent;border:0.5px solid var(--border);border-radius:50%;width:46px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:20px;padding:0;flex-shrink:0;}
.fc-speak:active{background:var(--bg-2);transform:scale(0.92);}
.fc-pos{font-size:14px;color:var(--text-2);font-style:italic;margin:0 0 18px;}
.fc-hint{font-size:13px;color:var(--text-3);margin-top:auto;text-align:center;padding-top:20px;}
.fc-trans{font-size:20px;font-weight:500;margin:0 0 14px;line-height:1.5;user-select:text;-webkit-user-select:text;}
.fc-ctx{font-size:15px;color:var(--text-2);line-height:1.6;margin:8px 0;padding:12px 14px;background:var(--bg-2);border-radius:10px;display:flex;gap:8px;align-items:flex-start;}
.fc-ctx-text{flex:1;user-select:text;-webkit-user-select:text;white-space:pre-line;}
.fc-ctx-speak{flex-shrink:0;background:transparent;border:0.5px solid var(--border);border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:15px;padding:0;}
.fc-src{font-size:13px;color:var(--text-3);margin-top:12px;user-select:text;-webkit-user-select:text;}
.fc-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px;}
.fc-btn{padding:18px 6px;border:0.5px solid var(--border);border-radius:12px;background:transparent;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);min-height:60px;}
.fc-btn:active{transform:scale(0.96);}
.fc-btn.ok{border-color:var(--ok-border);color:var(--ok);background:var(--ok-bg);}
.fc-btn.maybe{border-color:var(--maybe-border);color:var(--maybe);background:var(--maybe-bg);}
.fc-btn.no{border-color:var(--no-border);color:var(--no);background:var(--no-bg);}
.fc-controls{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px;flex-wrap:wrap;}
.fc-mini-btn{background:transparent;border:0.5px solid var(--border);color:var(--text-2);cursor:pointer;font-family:inherit;font-size:13px;padding:10px 14px;border-radius:8px;min-height:40px;}
.fc-mini-btn:active{background:var(--bg-2);}
.fc-quitbtn-big{background:var(--no-bg);border:0.5px solid var(--no-border);color:var(--no);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:8px;min-height:42px;}
.fc-quitbtn-big:active{background:var(--no-border);color:white;transform:scale(0.96);}
.fc-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);cursor:pointer;}
.fc-toggle input{cursor:pointer;width:18px;height:18px;}
.fc-done{text-align:center;padding:24px 16px;}
.fc-stat{display:inline-block;margin:0 10px;font-size:15px;color:var(--text-2);}
.fc-stat-num{font-size:32px;font-weight:600;display:block;}
.fc-hidden{display:none;}
.fc-startbtn{display:block;width:100%;padding:20px;margin:20px 0 12px;font-size:17px;font-weight:600;background:var(--info);color:white;border:none;border-radius:14px;cursor:pointer;}
.fc-startbtn:active{transform:scale(0.98);opacity:0.9;}
.fc-intro{text-align:center;padding:20px 16px;}
.fc-intro h2{font-size:24px;margin:0 0 8px;}
.fc-intro p{color:var(--text-2);font-size:15px;margin:0;}
.fc-summary{background:var(--bg-2);border-radius:12px;padding:16px;margin:16px 0;font-size:14px;color:var(--text-2);text-align:left;}
.fc-summary-row{display:flex;justify-content:space-between;padding:4px 0;}
.fc-summary-row b{color:var(--text);font-weight:500;}
.fc-list{text-align:left;margin:16px 0;max-height:60vh;overflow-y:auto;background:var(--card-bg);border:0.5px solid var(--border);border-radius:12px;}
.fc-list-item{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.fc-list-item:last-child{border-bottom:none;}
.fc-list-word{font-size:16px;font-weight:500;}
.fc-list-meta{font-size:13px;color:var(--text-3);}
.fc-list-empty{padding:30px;text-align:center;color:var(--text-3);font-size:14px;}
.fc-list-mark{display:inline-block;margin-right:8px;font-weight:700;font-size:15px;}
.fc-list-mark.mastered{color:var(--ok);}
.fc-list-mark.struggling{color:var(--no);}
.fc-link-btn{background:transparent;border:none;color:var(--info);cursor:pointer;font-family:inherit;font-size:15px;text-decoration:underline;padding:10px;}
.fc-warn-mt{font-size:12px;color:var(--text-3);margin-top:6px;font-style:italic;}
.fc-time-block{background:var(--bg-2);border-radius:12px;padding:14px 16px;margin:12px 0 16px;text-align:left;}
.fc-time-today{font-size:14px;color:var(--text-2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline;}
.fc-time-today b{color:var(--text);font-size:20px;font-weight:600;margin-left:8px;}
.fc-time-chart{display:flex;align-items:flex-end;gap:6px;height:60px;margin-top:8px;border-bottom:0.5px solid var(--border);padding-bottom:2px;}
.fc-time-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.fc-time-bar{width:100%;background:var(--text-3);border-radius:3px 3px 0 0;min-height:2px;}
.fc-time-bar.today{background:var(--text-2);}
.fc-time-labels{display:flex;gap:6px;margin-top:4px;}
.fc-time-label{flex:1;text-align:center;font-size:10px;color:var(--text-3);}
.fc-time-label.today{color:var(--text-2);font-weight:600;}
.fc-time-val{font-size:9px;color:var(--text-3);min-height:11px;}
.fc-session-time{font-size:14px;color:var(--text-2);margin:8px 0 0;}
</style>
</head>
<body>

<div id="fc-intro" class="fc-intro">
  <h2>📚 LR単語帳</h2>
  <p>頻出100語・重み付きランダム</p>
  <div class="fc-time-block" id="fc-time-block">
    <div class="fc-time-today">
      <span>今日の学習時間</span><b id="fc-time-today-val">0分</b>
    </div>
    <div class="fc-time-chart" id="fc-time-chart"></div>
    <div class="fc-time-labels" id="fc-time-labels"></div>
  </div>
  <div class="fc-summary" id="fc-summary"></div>
  <button class="fc-startbtn" onclick="startApp()">▶ スタート</button>
  <button class="fc-link-btn" onclick="showWordList()">📋 単語一覧を見る</button>
</div>

<div id="fc-wordlist-view" class="fc-hidden">
  <div class="fc-head">
    <span>📋 単語一覧 (100語)</span>
    <button class="fc-quitbtn" onclick="hideWordList()">戻る</button>
  </div>
  <p style="font-size:12px;color:var(--text-3);margin:8px 0 12px;"><span style="color:var(--ok)">✓</span> 習得 / <span style="color:var(--no)">✓</span> 苦手</p>
  <div class="fc-list" id="fc-wordlist"></div>
</div>

<div id="fc-app" class="fc-hidden">
  <div class="fc-head">
    <span id="fc-counter">0枚</span>
  </div>

  <div id="fc-study">
    <div class="fc-card" id="fc-card">
      <div id="fc-front">
        <div class="fc-rank-row">
          <span class="fc-fl" id="fc-fl-front">頻出</span>
          <span id="fc-rank-front">順位 000</span>
          <span class="fc-mem-badge" id="fc-mem-front">未学習</span>
        </div>
        <div class="fc-word-row">
          <span class="fc-word" id="fc-word">word</span>
          <button class="fc-speak" id="fc-speak-front" aria-label="発音">🔊</button>
        </div>
        <p class="fc-pos" id="fc-pos">noun</p>
        <p class="fc-hint">タップで意味を表示</p>
      </div>
      <div id="fc-back" class="fc-hidden">
        <div class="fc-rank-row">
          <span class="fc-fl" id="fc-fl-back">頻出</span>
          <span id="fc-rank-back">順位 000</span>
          <span class="fc-mem-badge" id="fc-mem-back">未学習</span>
        </div>
        <div class="fc-word-row">
          <span class="fc-word" id="fc-word-back" style="font-size:28px;">word</span>
          <button class="fc-speak" id="fc-speak-back" aria-label="発音">🔊</button>
        </div>
        <p class="fc-trans" id="fc-trans">意味</p>
        <div class="fc-ctx" id="fc-ctx-en-wrap">
          <div class="fc-ctx-text" id="fc-ctx-en">example</div>
          <button class="fc-ctx-speak" id="fc-speak-ex" aria-label="例文を読み上げ">🔊</button>
        </div>
        <p class="fc-warn-mt fc-hidden" id="fc-warn-mt">※yujiさんの動画は機械翻訳のため英語例文を非表示</p>
        <div class="fc-ctx" id="fc-ctx-ja-wrap">
          <div class="fc-ctx-text" id="fc-ctx-ja">例文訳</div>
        </div>
        <p class="fc-src" id="fc-src">source</p>
      </div>
    </div>

    <div class="fc-actions" id="fc-actions" style="visibility:hidden">
      <button class="fc-btn no" onclick="rate(0)">忘れた</button>
      <button class="fc-btn maybe" onclick="rate(1)">怪しい</button>
      <button class="fc-btn ok" onclick="rate(2)">覚えた</button>
    </div>

    <div class="fc-controls">
      <button class="fc-mini-btn" onclick="skipCard()">→ スキップ</button>
      <button class="fc-quitbtn-big" onclick="quitSession()">やめる</button>
      <label class="fc-toggle">
        <input type="checkbox" id="fc-autoplay" checked>
        自動読み上げ
      </label>
    </div>
  </div>

  <div id="fc-done" class="fc-done fc-hidden">
    <h2 style="margin:0 0 12px;font-size:20px;">お疲れさま 🌙</h2>
    <p style="margin:0 0 8px;color:var(--text-2);font-size:14px;" id="fc-done-summary"></p>
    <p class="fc-session-time" id="fc-session-time"></p>
    <div style="margin:20px 0;">
      <div class="fc-stat"><span class="fc-stat-num" id="s-ok" style="color:var(--ok)">0</span>覚えた</div>
      <div class="fc-stat"><span class="fc-stat-num" id="s-maybe" style="color:var(--maybe)">0</span>怪しい</div>
      <div class="fc-stat"><span class="fc-stat-num" id="s-no" style="color:var(--no)">0</span>忘れた</div>
    </div>
    <button class="fc-btn" onclick="startApp()" style="margin:6px 0;width:100%;">続けてもう少し</button>
    <button class="fc-btn" onclick="goIntro()" style="margin:6px 0;width:100%;">トップに戻る</button>
  </div>
</div>

const MEM_KEY = 'lr_word_memory_v2';
const TIME_KEY = 'lr_study_time_v1';
const MASTERED_THRESHOLD = 5; // 「覚えた」5回で習得判定
const STRUGGLING_THRESHOLD = 5; // 「怪しい」+「忘れた」合計5回で苦手判定
const KEEP_DAYS = 90;

// ===== Study time tracking =====
function loadTime(){
  try{ return JSON.parse(localStorage.getItem(TIME_KEY)||'{}'); }catch(e){ return {}; }
}
function saveTime(t){
  try{ localStorage.setItem(TIME_KEY, JSON.stringify(t)); }catch(e){}
}
function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function pruneOldDays(t){
  // Keep only last KEEP_DAYS days
  const today = new Date();
  const cutoff = new Date(today.getTime() - KEEP_DAYS*24*60*60*1000);
  const cutoffKey = cutoff.toISOString().slice(0,10);
  let changed = false;
  for(const k of Object.keys(t)){
    if(k < cutoffKey){ delete t[k]; changed = true; }
  }
  return changed;
}
let studyTime = loadTime();
if(pruneOldDays(studyTime)) saveTime(studyTime);

// Session timer state
let sessionStartTs = null;       // timestamp when current segment started
let sessionAccumulatedMs = 0;    // total ms accumulated this session (excluding current running segment)
let sessionRunning = false;

function timerStart(){
  if(sessionRunning) return;
  sessionStartTs = Date.now();
  sessionRunning = true;
}
function timerPause(){
  if(!sessionRunning) return;
  sessionAccumulatedMs += Date.now() - sessionStartTs;
  sessionStartTs = null;
  sessionRunning = false;
}
function timerReset(){
  sessionStartTs = null;
  sessionAccumulatedMs = 0;
  sessionRunning = false;
}
function timerCurrentMs(){
  let total = sessionAccumulatedMs;
  if(sessionRunning && sessionStartTs){
    total += Date.now() - sessionStartTs;
  }
  return total;
}
function timerCommit(){
  // Add session time to today's total
  timerPause();
  const minutes = Math.round(sessionAccumulatedMs / 60000);
  if(minutes > 0){
    const k = todayKey();
    studyTime[k] = (studyTime[k]||0) + minutes;
    saveTime(studyTime);
  }
  return minutes;
}



// ===== Memory store (per-word, persists) =====
function loadMemory(){
  try{ return JSON.parse(localStorage.getItem(MEM_KEY)||'{}'); }catch(e){ return {}; }
}
function saveMemory(){
  try{ localStorage.setItem(MEM_KEY, JSON.stringify(memory)); }catch(e){}
}
let memory = loadMemory();

// Cleanup: remove memory entries not in current CARDS
(function cleanup(){
  const currentWords = new Set(CARDS.map(c=>c.w.toLowerCase()));
  let changed = false;
  for(const k of Object.keys(memory)){
    if(!currentWords.has(k)){ delete memory[k]; changed = true; }
  }
  if(changed) saveMemory();
})();

function memKey(card){ return (card.w||'').toLowerCase().trim(); }
function getMem(card){
  return memory[memKey(card)] || { weight:2.0, ok:0, maybe:0, no:0, last:0 };
}
function setMem(card, m){ memory[memKey(card)] = m; saveMemory(); }

function isMastered(m){
  return m.ok >= MASTERED_THRESHOLD;
}

function isStruggling(m){
  return (m.maybe + m.no) >= STRUGGLING_THRESHOLD;
}

function memBadge(card, m){
  if(isMastered(m)) return {label:'習得', cls:'fc-mem-known'};
  if(isStruggling(m)) return {label:'苦手', cls:'fc-mem-hard'};
  if(m.ok+m.maybe+m.no === 0) return {label:'未学習', cls:'fc-mem-new'};
  return {label:'学習中', cls:'fc-mem-learning'};
}

// ===== Weighted random pick =====
function pickCard(prevIdx){
  const weights = CARDS.map((c, i) => {
    if(CARDS.length>1 && i===prevIdx) return 0;
    const m = getMem(c);
    // Mastered words appear very rarely
    if(isMastered(m)) return 0.1;
    return m.weight;
  });
  const total = weights.reduce((a,b)=>a+b, 0);
  if(total <= 0) return Math.floor(Math.random()*CARDS.length);
  let r = Math.random() * total;
  for(let i=0; i<weights.length; i++){
    r -= weights[i];
    if(r <= 0) return i;
  }
  return weights.length - 1;
}

// ===== Speech =====
const synth = window.speechSynthesis;
let voices = [];
let preferredVoice = null;
let speechUnlocked = false;

function loadVoices(){
  if(!synth) return;
  voices = synth.getVoices();
  const enVoices = voices.filter(v=>v.lang.startsWith('en'));
  preferredVoice = enVoices.find(v=>/^Ava\b/i.test(v.name))
                || enVoices.find(v=>/^Allison\b/i.test(v.name))
                || enVoices.find(v=>/^Karen\b/i.test(v.name))
                || enVoices.find(v=>/^Samantha\b/i.test(v.name))
                || enVoices.find(v=>v.lang==='en-US')
                || enVoices[0] || null;
}
if(synth){ loadVoices(); synth.onvoiceschanged = loadVoices; }

function unlockSpeech(){
  if(speechUnlocked || !synth) return;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0; synth.speak(u);
  speechUnlocked = true;
}
function speak(text, opts={}){
  if(!synth || !text) return;
  unlockSpeech(); synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if(preferredVoice) u.voice = preferredVoice;
  u.lang = 'en-US';
  u.rate = opts.rate || 0.95;
  synth.speak(u);
}

let currentIdx = -1;

// ===== Intro summary =====
function renderIntroSummary(){
  let n=0,l=0,h=0,k=0;
  for(const c of CARDS){
    const m = getMem(c);
    if(isMastered(m)){ k++; continue; }
    if(m.ok+m.maybe+m.no===0){ n++; }
    else if(m.weight>=4){ h++; }
    else{ l++; }
  }
  document.getElementById('fc-summary').innerHTML = 
    '<div class="fc-summary-row"><span>このCSVの単語数</span><b>'+CARDS.length+'語</b></div>'+
    '<div class="fc-summary-row"><span>未学習</span><b>'+n+'</b></div>'+
    '<div class="fc-summary-row"><span>学習中</span><b>'+l+'</b></div>'+
    '<div class="fc-summary-row"><span>苦手</span><b style="color:var(--no)">'+h+'</b></div>'+
    '<div class="fc-summary-row"><span>習得</span><b style="color:var(--ok)">'+k+'</b></div>';
}
function renderTimeBlock(){
  const today = todayKey();
  const todayVal = studyTime[today] || 0;
  document.getElementById('fc-time-today-val').textContent = todayVal+'分';
  
  // Build last 7 days (oldest to newest)
  const days = [];
  const now = new Date();
  for(let i=6; i>=0; i--){
    const d = new Date(now.getTime() - i*24*60*60*1000);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const k = y+'-'+m+'-'+day;
    days.push({key:k, val: studyTime[k]||0, label: (d.getMonth()+1)+'/'+d.getDate(), isToday: k===today});
  }
  
  const maxVal = Math.max(...days.map(d=>d.val), 1);
  const chartEl = document.getElementById('fc-time-chart');
  const labelsEl = document.getElementById('fc-time-labels');
  
  chartEl.innerHTML = days.map(d=>{
    const heightPct = d.val === 0 ? 0 : Math.max(4, (d.val / maxVal) * 100);
    const valLabel = d.val === 0 ? '' : d.val;
    return '<div class="fc-time-bar-wrap">'+
      '<div class="fc-time-val">'+valLabel+'</div>'+
      '<div class="fc-time-bar'+(d.isToday?' today':'')+'" style="height:'+heightPct+'%"></div>'+
      '</div>';
  }).join('');
  
  labelsEl.innerHTML = days.map(d=>
    '<div class="fc-time-label'+(d.isToday?' today':'')+'">'+d.label+'</div>'
  ).join('');
}

window.addEventListener('DOMContentLoaded', ()=>{
  renderIntroSummary();
  renderTimeBlock();
});

// ===== Word list =====
function showWordList(){
  document.getElementById('fc-intro').classList.add('fc-hidden');
  document.getElementById('fc-wordlist-view').classList.remove('fc-hidden');
  
  const listEl = document.getElementById('fc-wordlist');
  listEl.innerHTML = CARDS.map(c => {
    const m = getMem(c);
    const mastered = isMastered(m);
    const struggling = !mastered && isStruggling(m);
    let mark = '';
    if(mastered) mark = '<span class="fc-list-mark mastered">✓</span>';
    else if(struggling) mark = '<span class="fc-list-mark struggling">✓</span>';
    return '<div class="fc-list-item">'+
      '<span class="fc-list-word">'+mark+c.w+'</span>'+
      '<span class="fc-list-meta">忘れた '+m.no+' / 怪しい '+m.maybe+' / 覚えた '+m.ok+'</span>'+
      '</div>';
  }).join('');
}
function hideWordList(){
  document.getElementById('fc-wordlist-view').classList.add('fc-hidden');
  document.getElementById('fc-intro').classList.remove('fc-hidden');
}

function startApp(){
  unlockSpeech();
  session = {count:0, ok:0, maybe:0, no:0};
  timerReset();
  timerStart();
  document.getElementById('fc-intro').classList.add('fc-hidden');
  document.getElementById('fc-mastered-view').classList.add('fc-hidden');
  document.getElementById('fc-app').classList.remove('fc-hidden');
  document.getElementById('fc-done').classList.add('fc-hidden');
  document.getElementById('fc-study').classList.remove('fc-hidden');
  prevIdx = -1;

function goIntro(){
  if(synth) synth.cancel();
  timerPause();
  document.getElementById('fc-app').classList.add('fc-hidden');
  document.getElementById('fc-intro').classList.remove('fc-hidden');
  renderIntroSummary();
  renderTimeBlock();
}

function quitSession(){
  if(session.count === 0){ goIntro(); return; }
  showSessionDone();
}

  document.getElementById('fc-trans').textContent = c.t;
  document.getElementById('fc-ctx-en').textContent = c.ce || '';
  document.getElementById('fc-ctx-ja').textContent = c.cj || '';
  document.getElementById('fc-src').textContent = '📺 '+(c.src||'');
  
  // Show/hide English context based on machine translation flag
  document.getElementById('fc-ctx-en-wrap').style.display = c.ce ? 'flex' : 'none';
  document.getElementById('fc-ctx-ja-wrap').style.display = c.cj ? 'flex' : 'none';
  document.getElementById('fc-warn-mt').classList.toggle('fc-hidden', !c.mt);
  
  flipped = false;
  document.getElementById('fc-front').classList.remove('fc-hidden');
  document.getElementById('fc-back').classList.add('fc-hidden');
  document.getElementById('fc-actions').style.visibility = 'hidden';
  
  if(document.getElementById('fc-autoplay').checked){
    setTimeout(()=>speak(c.w), 250);
  }
}

function flipCard(){
  if(flipped) return;
  flipped = true;
  document.getElementById('fc-front').classList.add('fc-hidden');
  document.getElementById('fc-back').classList.remove('fc-hidden');
  document.getElementById('fc-actions').style.visibility = 'visible';
  if(document.getElementById('fc-autoplay').checked){
    const c = CARDS[currentIdx];
    if(c.ce){ setTimeout(()=>speak(c.ce, {rate:0.9}), 300); }
  }
}

document.getElementById('fc-card').addEventListener('click', (e)=>{
  if(e.target.closest('button')) return;
  flipCard();
});
document.getElementById('fc-speak-front').addEventListener('click', (e)=>{
  e.stopPropagation(); speak(CARDS[currentIdx].w);
});
document.getElementById('fc-speak-back').addEventListener('click', (e)=>{
  e.stopPropagation(); speak(CARDS[currentIdx].w);
});
document.getElementById('fc-speak-ex').addEventListener('click', (e)=>{
  e.stopPropagation(); speak(CARDS[currentIdx].ce, {rate:0.9});
});

function rate(level){
  if(!flipped) return;
  const c = CARDS[currentIdx];
  const m = getMem(c);
  m.last = Date.now();
  if(level === 2){ m.ok++; m.weight = Math.max(0.2, m.weight*1.0); session.ok++; }
  else if(level === 1){ m.maybe++; m.weight = Math.min(5.0, m.weight*1.5); session.maybe++; }
  else { m.no++; m.weight = Math.min(5.0, m.weight*2.0); session.no++; }
  setMem(c, m);
  session.count++;
  prevIdx = currentIdx;
  nextCard();
}

function skipCard(){ prevIdx = currentIdx; nextCard(); }

function showSessionDone(){
  if(synth) synth.cancel();
  const sessionMin = timerCommit();
  document.getElementById('fc-study').classList.add('fc-hidden');
  document.getElementById('fc-done').classList.remove('fc-hidden');
  document.getElementById('s-ok').textContent = session.ok;
  document.getElementById('s-maybe').textContent = session.maybe;
  document.getElementById('s-no').textContent = session.no;
  document.getElementById('fc-done-summary').textContent = session.count+'枚やりました';
  const todayMin = studyTime[todayKey()] || 0;
  document.getElementById('fc-session-time').textContent = 
    '今回 '+sessionMin+'分 / 今日累計 '+todayMin+'分';
}

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    if(synth) synth.cancel();
    timerPause();
  } else {
    // Only resume if we're in the study view (session active)
    const studyVisible = !document.getElementById('fc-study').classList.contains('fc-hidden');
    const appVisible = !document.getElementById('fc-app').classList.contains('fc-hidden');
    if(studyVisible && appVisible){
      timerStart();
    }
  }
});
</script>
</body>
</html>
